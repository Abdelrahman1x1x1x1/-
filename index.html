```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نور الكهف</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal';
    background: #ffffff;
    color: #1C2739;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 400px;
    margin: auto;
}

.card {
    border: 1px solid #ddd;
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 15px;
}

h1 {
    margin-bottom: 20px;
}

button {
    background: #1C2739;
    color: white;
    border: none;
    padding: 15px;
    border-radius: 50px;
    width: 100%;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    opacity: 0.9;
}

.status {
    margin-top: 10px;
    font-size: 14px;
    color: #555;
}
</style>
</head>

<body>

<div class="container">
    <h1>🍃 نور الكهف</h1>

    <div class="card">
        <p id="location">📍 جاري تحديد موقعك...</p>
        <p id="prayer">🕌 جاري تحميل وقت الجمعة...</p>
    </div>

    <div class="card">
        <button onclick="requestPermission()">🔔 تفعيل الإشعارات</button>
    </div>

    <div class="card">
        <button onclick="markPrayer()">✅ صليت الجمعة</button>
    </div>

    <div class="card">
        <button onclick="testNotification()">🧪 تجربة إشعار</button>
    </div>

    <p class="status" id="status"></p>
</div>

<script>
let userLat, userLon;
let fridayTime;

// 📍 تحديد الموقع
function getLocation() {
    if (!navigator.geolocation) {
        document.getElementById("location").innerText = "❌ الموقع غير مدعوم";
        return;
    }

    navigator.geolocation.getCurrentPosition(pos => {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;

        document.getElementById("location").innerText = "📍 تم تحديد موقعك";
        getPrayerTimes();

    }, () => {
        document.getElementById("location").innerText = "❌ فشل تحديد الموقع";
    });
}

// 🕌 جلب مواقيت الصلاة
async function getPrayerTimes() {
    try {
        let res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${userLat}&longitude=${userLon}&method=5`);
        let data = await res.json();

        fridayTime = data.data.timings.Dhuhr;

        document.getElementById("prayer").innerText =
            "🕌 صلاة الجمعة: " + fridayTime;

        scheduleFriday();

    } catch {
        document.getElementById("prayer").innerText = "❌ فشل تحميل الوقت";
    }
}

// ⏰ جدولة الجمعة
function scheduleFriday() {
    let [h, m] = fridayTime.split(":");

    let now = new Date();
    let friday = new Date();

    let diff = (5 - now.getDay() + 7) % 7;
    if (diff === 0) diff = 7;

    friday.setDate(now.getDate() + diff);
    friday.setHours(h, m, 0);

    let delay = friday - now;

    document.getElementById("status").innerText =
        "⏳ التذكير القادم يوم الجمعة";

    setTimeout(() => {
        notify("🕌 صلاة الجمعة", "حان وقت صلاة الجمعة");
    }, delay);
}

// 🔔 إشعار
function notify(title, body) {
    if (Notification.permission === "granted") {
        new Notification(title, { body });
    }
}

// 🔐 طلب إذن
function requestPermission() {
    Notification.requestPermission().then(p => {
        if (p === "granted") {
            alert("✅ تم تفعيل الإشعارات");
        } else {
            alert("❌ لم يتم تفعيل الإشعارات");
        }
    });
}

// ✅ بعد الصلاة
function markPrayer() {
    notify("⏳ بعد ساعة", "سيتم تذكيرك بسورة الكهف");

    setTimeout(() => {
        notify("📖 سورة الكهف", "لا تنس قراءة سورة الكهف");
    }, 60 * 60 * 1000);

    document.getElementById("status").innerText =
        "📖 سيتم تذكيرك بسورة الكهف بعد ساعة";
}

// 🧪 تجربة
function testNotification() {
    notify("🔥 تجربة", "الإشعارات تعمل بنجاح");
}

// 🚀 تشغيل
getLocation();
</script>

</body>
</html>
```
